# Запускает Vitest при push и в PR в основные ветки репозитория.
name: Unit tests

on:
  push:
    branches: [main, dev, UAT]
  pull_request:
    branches: [main, dev, UAT]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
